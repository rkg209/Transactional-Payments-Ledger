# SPEC 0001 builds only org.ledger.account, org.ledger.transfer, org.ledger.db (and .generated).
# Modules from later specs (idempotency, saga, reconciliation, concurrency, api.dto) don't exist
# yet, so their boundary rules in ArchitectureFitnessTest legitimately match zero classes today.
# Without this, ArchUnit fails a rule that matches no classes by default -- but an empty match here
# means "nothing to violate the rule yet", not "the rule is broken". As each later spec adds
# classes to a module, its rule starts enforcing the boundary immediately, with no code change here.
archRule.failOnEmptyShould=false
