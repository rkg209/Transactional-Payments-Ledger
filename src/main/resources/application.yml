spring:
  application:
    name: payments-ledger

  # Java 21 virtual threads (CON-1). A transfer blocked on SELECT ... FOR UPDATE
  # parks its virtual thread instead of pinning a platform thread, which is what
  # makes a high-concurrency pessimistic-locking server realistic at all.
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ledger}
    username: ${SPRING_DATASOURCE_USERNAME:ledger}
    password: ${SPRING_DATASOURCE_PASSWORD:ledger}
    hikari:
      # Connection-pool size bounds real concurrency against the database. It is
      # tuned deliberately in SPEC 0008 against the benchmark, not guessed here.
      maximum-pool-size: ${DB_POOL_SIZE:20}
      # HikariCP must never silently retry a failed transaction: a retried
      # transfer that the application does not know about could double-post.
      auto-commit: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jooq:
    sql-dialect: postgres

ledger:
  # Selected at startup. Both strategies are implemented and benchmarked
  # (SPEC 0004 / 0008); neither is a default we settled for.
  concurrency-strategy: ${CONCURRENCY_STRATEGY:pessimistic}
  isolation-level: ${ISOLATION_LEVEL:read_committed}
  concurrency:
    # Bounded retry loop around the transfer transaction (SPEC 0004 / ADR 0006). Backoff is
    # 50ms * 2^(attempt-1), capped at 800ms; exhaustion maps to 409 CONFLICT_RETRY_EXHAUSTED.
    max-attempts: ${CONCURRENCY_MAX_ATTEMPTS:5}
    backoff-base-ms: ${CONCURRENCY_BACKOFF_BASE_MS:50}
  reconciliation:
    interval-ms: ${RECONCILIATION_INTERVAL_MS:60000}
    # Off in most test contexts (AbstractPostgresIT sets this false); a background job firing
    # mid-test against a TRUNCATE-ing suite is a flake generator, and every reconciliation IT
    # drives runCheck() explicitly. ReconciliationScheduleIT turns it back on to prove the wiring.
    scheduled: ${RECONCILIATION_SCHEDULED:true}
  # Comma-separated set of valid API keys (ADR 0003). API_KEYS wins if set; API_KEY
  # (singular) is also honored for a single-key deployment. The default dev key
  # ships so `make run` / `docker compose up` work out of the box -- demo.sh uses
  # this same key. Never a production credential.
  api-keys: ${API_KEYS:${API_KEY:secret-dev-key-001}}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: payments-ledger

logging:
  level:
    root: INFO
    org.ledger: INFO
    org.jooq.tools.LoggerListener: DEBUG
